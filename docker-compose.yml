version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: liveunpad-db
    environment:
      POSTGRES_DB: liveunpad
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # Uncomment to run backend in container
  # backend:
  #   build:
  #     context: ./liveunpad-api
  #     dockerfile: Dockerfile
  #   container_name: liveunpad-api
  #   ports:
  #     - '3001:3001'
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/liveunpad
  #     NODE_ENV: development
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   volumes:
  #     - ./liveunpad-api:/app
  #     - /app/node_modules

  # Uncomment to run frontend in container
  # frontend:
  #   build:
  #     context: ./liveunpad-app
  #     dockerfile: Dockerfile
  #   container_name: liveunpad-app
  #   ports:
  #     - '3000:3000'
  #   environment:
  #     NEXT_PUBLIC_API_URL: http://backend:3001
  #   depends_on:
  #     - backend
  #   volumes:
  #     - ./liveunpad-app:/app
  #     - /app/node_modules

volumes:
  postgres_data:
