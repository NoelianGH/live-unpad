name: Deploy - Frontend

on:
  push:
    branches: [ main ]
    paths:
      - 'liveunpad-app/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: liveunpad-app/package-lock.json

      - name: Install dependencies
        working-directory: liveunpad-app
        run: npm ci

      - name: Build
        working-directory: liveunpad-app
        run: npm run build

      # Add your deployment steps here
