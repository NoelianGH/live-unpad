name: CI - Backend

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'liveunpad-api/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'liveunpad-api/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: liveunpad_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: liveunpad-api/package-lock.json

      - name: Install dependencies
        working-directory: liveunpad-api
        run: npm ci

      - name: Generate Prisma Client
        working-directory: liveunpad-api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/liveunpad_test
        run: npm run prisma:generate

      - name: Run Prisma migrations
        working-directory: liveunpad-api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/liveunpad_test
        run: npm run prisma:migrate -- --skip-generate

      - name: Lint
        working-directory: liveunpad-api
        run: npm run lint

      - name: Run tests
        working-directory: liveunpad-api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/liveunpad_test
        run: npm test
